<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aankoop overzicht — Concreet Vastgoed</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#FAF5F0;--surface:#FFFFFF;--surface2:#F2E6D9;--text:#70899D;--text2:#8BA49F;--text3:#a8b8b3;
--accent:#C36C5E;--accent-light:#faf0ee;--accent-dark:#a95a4e;
--border:rgba(112,137,157,0.15);--border2:rgba(112,137,157,0.25);
--danger:#C36C5E;--danger-bg:#faf0ee;
--green:#8BA49F;--green-bg:#edf3f1;
--orange:#C9882C;--orange-bg:rgba(201,136,44,.08);
--radius:10px;--radius-lg:14px;
--sidebar-w:380px;
}
body{font-family:'Titillium Web',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
.sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:'Instrument Serif',serif;font-size:22px;color:var(--accent);font-weight:400}
.sidebar-sub{font-size:11px;color:var(--text2);margin-top:2px}
.sidebar-actions{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px}
.sidebar-actions input{flex:1;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:#5a7485}
.sidebar-actions input:focus{outline:none;border-color:var(--accent)}
.btn-new{padding:8px 14px;border:none;border-radius:var(--radius);font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;background:#70899D;color:#fff;transition:background .15s;white-space:nowrap}
.btn-new:hover{background:#5a7485}

/* Checklist overview in sidebar */
.sidebar-list{flex:1;overflow-y:auto;padding:6px 0}
.sidebar-item{padding:12px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.sidebar-item:hover{background:var(--surface2)}
.sidebar-item.active{background:var(--surface2);border-left-color:var(--accent)}
.sidebar-item .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sidebar-item .name{font-size:14px;font-weight:600;color:#5a7485}
.sidebar-item .price{font-size:13px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.sidebar-item .checklist{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
.check-dot{font-size:11px;font-weight:600}
.check-dot.ok{color:var(--green)}
.check-dot.nok{color:var(--danger)}

.sidebar-footer{padding:12px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh}
.main-bar{padding:14px 2rem;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;min-height:56px}
.main-bar .title{font-family:'Instrument Serif',serif;font-size:20px;color:#5a7485;font-weight:400}
.main-bar .actions{display:flex;gap:8px}
.btn{padding:7px 16px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s;font-weight:600}
.btn:hover{background:var(--surface2)}
.btn-primary{background:#70899D;border-color:#70899D;color:#fff}.btn-primary:hover{background:#5a7485}
.btn-danger{color:var(--accent);border-color:var(--accent)}.btn-danger:hover{background:var(--accent-light)}
.btn-sm{padding:4px 10px;font-size:11px}

.main-content{flex:1;overflow-y:auto;padding:1.5rem 2rem 3rem}
.main-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:15px}

/* DETAIL */
.section-title{font-family:'Instrument Serif',serif;font-size:16px;font-weight:400;color:#5a7485;margin-bottom:.75rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-block{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.detail-block .bh{padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'Instrument Serif',serif;font-size:15px;color:#5a7485;display:flex;align-items:center;justify-content:space-between}
.detail-block .bb{padding:16px 18px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;font-weight:700;margin-bottom:3px}
.field .val{font-size:14px;color:#5a7485}.field .val.empty{color:var(--text3);font-style:italic}
.field .val.money{font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}

.indicator{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);margin-bottom:6px;font-size:13px}
.indicator .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.indicator.ok{background:var(--green-bg);color:var(--green)}.indicator.ok .dot{background:var(--green)}
.indicator.warn{background:var(--orange-bg);color:var(--orange)}.indicator.warn .dot{background:var(--orange)}
.indicator.bad{background:var(--danger-bg);color:var(--danger)}.indicator.bad .dot{background:var(--danger)}
.indicator.neutral{background:var(--surface2);color:var(--text3)}.indicator.neutral .dot{background:var(--text3)}

/* Financiering cards */
.fin-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px}
.fin-card .fin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fin-card .fin-bank{font-weight:600;color:#5a7485;font-size:14px}
.fin-card .fin-status{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.fin-card .fin-status.niet_gestart{background:var(--surface2);color:var(--text3)}
.fin-card .fin-status.aangevraagd{background:var(--orange-bg);color:var(--orange)}
.fin-card .fin-status.toegekend{background:var(--green-bg);color:var(--green)}
.fin-card .fin-status.afgewezen{background:var(--danger-bg);color:var(--danger)}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(90,116,133,.25);display:flex;align-items:flex-start;justify-content:center;z-index:100;backdrop-filter:blur(3px);padding-top:4vh;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:600px;max-width:95vw;margin-bottom:4vh}
.modal h2{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;color:var(--accent);margin-bottom:1.25rem}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;background:var(--bg);color:#5a7485}
.fg textarea{min-height:50px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(195,108,94,.08)}
.fg .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg .row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.sd{font-family:'Instrument Serif',serif;font-size:15px;color:#5a7485;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:1.5rem}

/* Fin edit blocks in form */
.fin-edit{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;position:relative}
.fin-edit .fin-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.fin-edit .fin-remove:hover{color:var(--danger);background:var(--danger-bg)}
.add-fin{border:1px dashed var(--border2);border-radius:var(--radius);padding:8px;text-align:center;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s}
.add-fin:hover{border-color:#70899D;background:var(--surface2);color:#70899D}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 20px;font-size:13px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.08);animation:si .3s}
.toast.ok{border-left:4px solid var(--green)}.toast.err{border-left:4px solid var(--danger)}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.hidden{display:none!important}
@media(max-width:768px){.app{flex-direction:column}.sidebar{width:100%;min-width:100%;height:auto;position:relative}.sidebar-list{max-height:40vh}.field-grid,.fg .row,.fg .row3,.fg .row4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-header"><div class="sidebar-logo"><!-- Plak hier de <img> tag van het Concreet logo uit de DD Tool --><span style="font-family:Instrument Serif,serif;font-size:22px;color:var(--accent)">Concreet</span></div><div class="sidebar-sub">Aankoop overzicht</div></div>
  <div class="sidebar-actions"><input type="text" placeholder="Zoeken..." id="search" oninput="render()"><button class="btn-new" onclick="showAdd()">+ Nieuw</button></div>
  <div class="sidebar-list" id="sidebarList"></div>
  <div class="sidebar-footer" id="footer"></div>
</aside>
<div class="main">
  <div class="main-bar"><span class="title" id="mainTitle">Overzicht</span><div class="actions" id="mainActions"></div></div>
  <div class="main-content" id="mc"><div class="main-empty">Selecteer een object of maak een nieuw object aan.</div></div>
</div>
</div>
<div id="mOvl" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()"><div class="modal" id="mCnt"></div></div>

<script>
const SB_URL='https://diijaerxzgimmyskrjwy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpaWphZXJ4emdpbW15c2tyand5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTk0MjQsImV4cCI6MjA5MTA3NTQyNH0.XVdefN6qfv8kFKdlX-VeXjKnuvtFfaJ_wax0ndcANjY';
const H={'Content-Type':'application/json',apikey:SB_KEY,Authorization:'Bearer '+SB_KEY};
let acqs=[],activeId=null;

async function sb(t,m,b,q){
  const u=`${SB_URL}/rest/v1/${t}${q||''}`;
  const o={method:m||'GET',headers:{...H}};
  if(m==='GET'||!m)o.headers['Accept']='application/json';
  if(b)o.body=JSON.stringify(b);
  if(m==='POST'||m==='PATCH')o.headers['Prefer']='return=representation';
  try{
    const r=await fetch(u,o);
    if(!r.ok){const e=await r.text();console.error(e);showToast('Fout: '+e.substring(0,120),'err');return null}
    if(m==='DELETE')return true;return r.json();
  }catch(e){showToast('Verbinding mislukt: '+e.message,'err');return null}
}

async function loadAll(){
  acqs=await sb('acquisitions','GET',null,'?order=created_at.desc')||[];
  render();
  if(activeId){const a=acqs.find(x=>x.id===activeId);if(a)showDetail(a.id);else{activeId=null;showEmpty()}}
}

const fmt=a=>{if(!a&&a!==0)return'\u2014';return'\u20AC\u00A0'+Number(a).toLocaleString('nl-NL',{maximumFractionDigits:0})};
const fmtD=d=>{if(!d)return'\u2014';return new Date(d+'T12:00:00').toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'})};
const daysUntil=d=>{if(!d)return null;const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(d+'T12:00:00')-n)/864e5)};

// === CHECKLIST LOGIC ===
function checks(a){
  const fins=a.financieringen||[];
  const hasFin=fins.length>0;
  const finOk=fins.some(f=>f.status==='toegekend');
  return{
    dd:a.dd_status==='afgerond',
    lev:!!a.levering_date,
    wb:!!a.waarborg_paid,
    tax:!!a.taxatie_done,
    fin:finOk
  };
}
function dotHTML(ok,label){
  return`<span class="check-dot ${ok?'ok':'nok'}">${label}</span>`;
}

// === RENDER ===
function render(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const items=q?acqs.filter(a=>(a.name||'').toLowerCase().includes(q)):acqs;

  document.getElementById('sidebarList').innerHTML=items.map(a=>{
    const c=checks(a);
    const price=a.purchase_price;
    return`<div class="sidebar-item${a.id===activeId?' active':''}" onclick="showDetail('${a.id}')">
      <div class="top"><span class="name">${a.name}</span>${price?`<span class="price">${fmt(price)}</span>`:''}</div>
      <div class="checklist">
        ${dotHTML(c.dd,'Due diligence')}
        ${dotHTML(c.lev,'Levering')}
        ${dotHTML(c.wb,'Waarborg')}
        ${dotHTML(c.tax,'Taxatie')}
        ${dotHTML(c.fin,'Financiering')}
      </div>
    </div>`;
  }).join('')||'<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Geen objecten</div>';

  document.getElementById('footer').textContent=acqs.length+' objecten';
}

function showEmpty(){
  document.getElementById('mainTitle').textContent='Overzicht';
  document.getElementById('mainActions').innerHTML='';
  document.getElementById('mc').innerHTML='<div class="main-empty">Selecteer een object of klik "+ Nieuw".</div>';
}

// === DETAIL ===
function showDetail(id){
  const a=acqs.find(x=>x.id===id);if(!a)return;
  activeId=id;render();

  document.getElementById('mainTitle').textContent=a.name;
  document.getElementById('mainActions').innerHTML=`<button class="btn btn-primary" onclick="showEdit('${a.id}')">Bewerken</button><button class="btn btn-danger" onclick="delAcq('${a.id}')">Verwijderen</button>`;

  const ddD=a.dd_end?daysUntil(a.dd_end):null;
  const wbD=a.waarborg_deadline?daysUntil(a.waarborg_deadline):null;
  const levD=a.levering_date?daysUntil(a.levering_date):null;
  const fins=a.financieringen||[];

  document.getElementById('mc').innerHTML=`
    <div style="margin-bottom:1.5rem">
      ${a.dd_status==='afgerond'?'<div class="indicator ok"><div class="dot"></div>DD afgerond</div>':
        a.dd_status==='lopend'?`<div class="indicator ${ddD!==null&&ddD<0?'bad':ddD!==null&&ddD<=7?'warn':'ok'}"><div class="dot"></div>DD loopt${ddD!==null?' \u2014 '+(ddD<0?Math.abs(ddD)+' dagen over deadline':ddD+' dagen resterend'):''}</div>`:
        '<div class="indicator neutral"><div class="dot"></div>DD niet gestart</div>'}
      ${a.levering_date?`<div class="indicator ${levD!==null&&levD>=0&&levD<=7?'warn':'ok'}"><div class="dot"></div>Levering: ${fmtD(a.levering_date)}${levD!==null&&levD>=0?' ('+levD+' dagen)':''}</div>`:
        '<div class="indicator neutral"><div class="dot"></div>Leveringsdatum niet bekend</div>'}
      ${a.waarborg_paid?'<div class="indicator ok"><div class="dot"></div>Waarborg betaald</div>':
        a.waarborg_deadline?`<div class="indicator ${wbD!==null&&wbD<0?'bad':wbD!==null&&wbD<=3?'warn':'neutral'}"><div class="dot"></div>Waarborg ${wbD!==null?(wbD<0?Math.abs(wbD)+' dagen te laat':wbD+' dagen tot deadline'):'open'}</div>`:
        '<div class="indicator neutral"><div class="dot"></div>Waarborg niet ingesteld</div>'}
      ${a.taxatie_done?`<div class="indicator ok"><div class="dot"></div>Taxatie: ${fmt(a.taxatie_value)}${a.taxatie_by?' door '+a.taxatie_by:''}</div>`:
        '<div class="indicator neutral"><div class="dot"></div>Nog geen taxatie</div>'}
      ${fins.some(f=>f.status==='toegekend')?'<div class="indicator ok"><div class="dot"></div>Financiering rond</div>':
        fins.some(f=>f.status==='aangevraagd')?'<div class="indicator warn"><div class="dot"></div>Financiering lopend</div>':
        '<div class="indicator neutral"><div class="dot"></div>Financiering niet gestart</div>'}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div class="detail-block"><div class="bh">Object</div><div class="bb">
        <div class="field"><label>Koopprijs</label><div class="val money">${fmt(a.purchase_price)}</div></div>
      </div></div>

      <div class="detail-block"><div class="bh">Due Diligence</div><div class="bb">
        <div class="field-grid">
          <div class="field"><label>Status</label><div class="val">${{niet_gestart:'Niet gestart',lopend:'Lopend',afgerond:'Afgerond',verlengd:'Verlengd'}[a.dd_status]||'\u2014'}</div></div>
          <div class="field"><label>Start</label><div class="val">${fmtD(a.dd_start)}</div></div>
          <div class="field"><label>Deadline</label><div class="val">${fmtD(a.dd_end)}</div></div>
        </div>
        ${a.dd_notes?`<div style="margin-top:10px;font-size:13px;color:var(--text2);white-space:pre-wrap">${a.dd_notes}</div>`:''}
      </div></div>

      <div class="detail-block"><div class="bh">Levering</div><div class="bb">
        <div class="field-grid">
          <div class="field"><label>Datum</label><div class="val">${fmtD(a.levering_date)}</div></div>
          <div class="field"><label>Notaris</label><div class="val">${a.notaris||'\u2014'}</div></div>
        </div>
      </div></div>

      <div class="detail-block"><div class="bh">Waarborg</div><div class="bb">
        <div class="field-grid">
          <div class="field"><label>Bedrag</label><div class="val money">${fmt(a.waarborg_amount)}</div></div>
          <div class="field"><label>Deadline</label><div class="val">${fmtD(a.waarborg_deadline)}</div></div>
          <div class="field"><label>Betaald</label><div class="val">${a.waarborg_paid?'<span style="color:var(--green);font-weight:700">Ja \u2713</span>':'<span style="color:var(--accent)">Nee</span>'}</div></div>
        </div>
      </div></div>

      <div class="detail-block"><div class="bh">Taxatie</div><div class="bb">
        <div class="field-grid">
          <div class="field"><label>Uitgevoerd</label><div class="val">${a.taxatie_done?'<span style="color:var(--green);font-weight:700">Ja \u2713</span>':'Nee'}</div></div>
          <div class="field"><label>Waarde</label><div class="val money">${fmt(a.taxatie_value)}</div></div>
          <div class="field"><label>Datum</label><div class="val">${fmtD(a.taxatie_date)}</div></div>
          <div class="field"><label>Taxateur</label><div class="val">${a.taxatie_by||'\u2014'}</div></div>
        </div>
      </div></div>

      <div class="detail-block"><div class="bh">Financieringen <span style="font-size:12px;color:var(--text3);font-family:'Titillium Web'">${fins.length} stuks</span></div><div class="bb">
        ${fins.length?fins.map(f=>`<div class="fin-card">
          <div class="fin-top"><span class="fin-bank">${f.bank||'Onbekend'}</span><span class="fin-status ${f.status||'niet_gestart'}">${{niet_gestart:'Niet gestart',aangevraagd:'Aangevraagd',toegekend:'Toegekend',afgewezen:'Afgewezen'}[f.status]||f.status}</span></div>
          <div class="field-grid">
            <div class="field"><label>Bedrag</label><div class="val money">${fmt(f.amount)}</div></div>
            <div class="field"><label>Rente</label><div class="val">${f.rente?f.rente+'%':'\u2014'}</div></div>
            <div class="field"><label>Rentevast periode</label><div class="val">${fmtD(f.deadline)}</div></div>
          </div>
        </div>`).join(''):'<div style="color:var(--text3);font-size:13px;font-style:italic">Nog geen financieringen</div>'}
      </div></div>
    </div>`;
}

// === ADD / EDIT ===
let editFins=[];
function showAdd(){editFins=[];showForm(null)}
function showEdit(id){const a=acqs.find(x=>x.id===id);if(a)editFins=[...(a.financieringen||[])];showForm(a)}

function showForm(a){
  const isEdit=!!a;if(!a)a={};
  renderForm(a,isEdit);
  document.getElementById('mOvl').classList.remove('hidden');
}

function renderForm(a,isEdit){
  document.getElementById('mCnt').innerHTML=`
    <h2>${isEdit?a.name||'Bewerken':'Nieuw object'}</h2>

    <div class="sd">Object</div>
    <div class="fg"><div class="row">
      <div><label>Projectnaam</label><input id="fName" value="${a.name||''}"></div>
      <div><label>Koopprijs</label><input id="fBuy" type="number" value="${a.purchase_price||''}"></div>
    </div></div>

    <div class="sd">Due Diligence</div>
    <div class="fg"><div class="row3">
      <div><label>Status</label><select id="fDDs"><option value="niet_gestart" ${a.dd_status==='niet_gestart'||!a.dd_status?'selected':''}>Niet gestart</option><option value="lopend" ${a.dd_status==='lopend'?'selected':''}>Lopend</option><option value="afgerond" ${a.dd_status==='afgerond'?'selected':''}>Afgerond</option><option value="verlengd" ${a.dd_status==='verlengd'?'selected':''}>Verlengd</option></select></div>
      <div><label>Start</label><input id="fDDstart" type="date" value="${a.dd_start||''}"></div>
      <div><label>Deadline</label><input id="fDDend" type="date" value="${a.dd_end||''}"></div>
    </div></div>
    <div class="fg"><label>DD Notities</label><textarea id="fDDnotes">${a.dd_notes||''}</textarea></div>

    <div class="sd">Levering</div>
    <div class="fg"><div class="row">
      <div><label>Leveringsdatum</label><input id="fLevDate" type="date" value="${a.levering_date||''}"></div>
      <div><label>Notaris</label><input id="fNotaris" value="${a.notaris||''}"></div>
    </div></div>

    <div class="sd">Waarborg</div>
    <div class="fg"><div class="row3">
      <div><label>Bedrag</label><input id="fWbAmt" type="number" value="${a.waarborg_amount||''}"></div>
      <div><label>Deadline</label><input id="fWbDate" type="date" value="${a.waarborg_deadline||''}"></div>
      <div><label>Betaald</label><select id="fWbPaid"><option value="false" ${!a.waarborg_paid?'selected':''}>Nee</option><option value="true" ${a.waarborg_paid?'selected':''}>Ja</option></select></div>
    </div></div>

    <div class="sd">Taxatie</div>
    <div class="fg"><div class="row">
      <div><label>Uitgevoerd</label><select id="fTaxDone"><option value="false" ${!a.taxatie_done?'selected':''}>Nee</option><option value="true" ${a.taxatie_done?'selected':''}>Ja</option></select></div>
      <div><label>Waarde</label><input id="fTaxVal" type="number" value="${a.taxatie_value||''}"></div>
    </div></div>
    <div class="fg"><div class="row">
      <div><label>Datum</label><input id="fTaxDate" type="date" value="${a.taxatie_date||''}"></div>
      <div><label>Taxateur</label><input id="fTaxBy" value="${a.taxatie_by||''}"></div>
    </div></div>

    <div class="sd">Financieringen</div>
    <div id="finsContainer"></div>
    <div class="add-fin" onclick="addFin()">+ Financiering toevoegen</div>

    <div class="ma">
      <button class="btn" onclick="closeModal()">Annuleer</button>
      <button class="btn btn-primary" onclick="saveAcq(${isEdit?"'"+a.id+"'":"null"})">${isEdit?'Opslaan':'Toevoegen'}</button>
    </div>`;
  renderFins();
}

function renderFins(){
  const c=document.getElementById('finsContainer');if(!c)return;
  c.innerHTML=editFins.map((f,i)=>`<div class="fin-edit">
    <button class="fin-remove" onclick="removeFin(${i})">\u00D7</button>
    <div class="fg"><div class="row4">
      <div><label>Bank</label><input value="${f.bank||''}" onchange="editFins[${i}].bank=this.value"></div>
      <div><label>Bedrag</label><input type="number" value="${f.amount||''}" onchange="editFins[${i}].amount=parseFloat(this.value)||null"></div>
      <div><label>Rente (%)</label><input type="number" step="0.01" value="${f.rente||''}" onchange="editFins[${i}].rente=parseFloat(this.value)||null"></div>
      <div><label>Status</label><select onchange="editFins[${i}].status=this.value"><option value="niet_gestart" ${f.status==='niet_gestart'||!f.status?'selected':''}>Niet gestart</option><option value="aangevraagd" ${f.status==='aangevraagd'?'selected':''}>Aangevraagd</option><option value="toegekend" ${f.status==='toegekend'?'selected':''}>Toegekend</option><option value="afgewezen" ${f.status==='afgewezen'?'selected':''}>Afgewezen</option></select></div>
    </div></div>
    <div class="fg"><div class="row"><div><label>Rentevast periode</label><input type="date" value="${f.deadline||''}" onchange="editFins[${i}].deadline=this.value||null"></div><div></div></div></div>
  </div>`).join('');
}

function addFin(){editFins.push({bank:'',amount:null,rente:null,deadline:null,status:'niet_gestart'});renderFins()}
function removeFin(i){editFins.splice(i,1);renderFins()}

async function saveAcq(id){
  const data={
    name:document.getElementById('fName').value.trim(),
    purchase_price:parseFloat(document.getElementById('fBuy').value)||null,
    dd_status:document.getElementById('fDDs').value,
    dd_start:document.getElementById('fDDstart').value||null,
    dd_end:document.getElementById('fDDend').value||null,
    dd_notes:document.getElementById('fDDnotes').value.trim()||null,
    levering_date:document.getElementById('fLevDate').value||null,
    notaris:document.getElementById('fNotaris').value.trim()||null,
    waarborg_amount:parseFloat(document.getElementById('fWbAmt').value)||null,
    waarborg_deadline:document.getElementById('fWbDate').value||null,
    waarborg_paid:document.getElementById('fWbPaid').value==='true',
    taxatie_done:document.getElementById('fTaxDone').value==='true',
    taxatie_value:parseFloat(document.getElementById('fTaxVal').value)||null,
    taxatie_date:document.getElementById('fTaxDate').value||null,
    taxatie_by:document.getElementById('fTaxBy').value.trim()||null,
    financieringen:editFins,
    updated_at:new Date().toISOString()
  };
  if(!data.name){showToast('Vul een naam in','err');return}
  if(id){
    const res=await sb('acquisitions','PATCH',data,`?id=eq.${id}`);
    if(!res)return;
    closeModal();await loadAll();showDetail(id);showToast('Bijgewerkt','ok');
  }else{
    const res=await sb('acquisitions','POST',data);
    if(!res)return;
    closeModal();await loadAll();
    if(res&&res[0])showDetail(res[0].id);
    showToast('Toegevoegd','ok');
  }
}

async function delAcq(id){
  if(!confirm('Verwijderen?'))return;
  await sb('acquisitions','DELETE',null,`?id=eq.${id}`);
  activeId=null;await loadAll();showEmpty();showToast('Verwijderd','ok');
}

function closeModal(){document.getElementById('mOvl').classList.add('hidden')}
function showToast(m,t){document.querySelectorAll('.toast').forEach(x=>x.remove());const e=document.createElement('div');e.className='toast '+(t||'ok');e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),4e3)}

loadAll();
</script>
</body>
</html>
